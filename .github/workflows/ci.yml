name: CI

on:
  push:
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  NO_COLOR: "1"
  # Release channel for akgentic-* dependencies. On a release branch set this
  # to that branch (e.g. version-1.x); the rewrite step below pins every
  # akgentic-* dependency to it.
  RELEASE_BRANCH: master

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout akgentic-tool
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "latest"

      - name: Set up Python 3.12
        run: uv python install 3.12

      # In the akgentic-quick-start workspace, akgentic-* deps use
      # `workspace = true`. Standalone CI has no workspace, so rewrite each
      # akgentic-* source to a GitHub git source at RELEASE_BRANCH. uv then
      # resolves the transitive tree itself.
      - name: Rewrite akgentic-* sources to git at RELEASE_BRANCH
        run: |
          sed -i -E "s#^(akgentic-[a-z-]+) = \{ workspace = true \}#\1 = { git = \"https://github.com/b12consulting/\1.git\", branch = \"${RELEASE_BRANCH}\" }#" pyproject.toml
          echo "--- rewritten [tool.uv.sources] ---"
          grep -E '^akgentic-' pyproject.toml

      # --all-extras installs optional deps (weaviate, vision/PIL, docs) so mypy
      # can analyze their imports.
      - name: Install dependencies
        run: uv sync --all-extras

      - name: Type checking
        run: uv run mypy src/

      - name: Linting
        run: uv run ruff check src/

      - name: Run tests with coverage
        run: >
          uv run pytest tests/
          --cov=akgentic.tool
          --cov-report=term-missing
          --cov-report=json:coverage.json
          --cov-fail-under=80

      - name: Update coverage badge
        if: github.ref_name == 'master' && github.event_name == 'push'
        run: |
          COVERAGE=$(python -c "import json; print(int(json.load(open('coverage.json'))['totals']['percent_covered_display']))")
          if [ "$COVERAGE" -ge 90 ]; then COLOR="brightgreen"
          elif [ "$COVERAGE" -ge 80 ]; then COLOR="green"
          elif [ "$COVERAGE" -ge 70 ]; then COLOR="yellow"
          else COLOR="red"; fi
          echo "{\"schemaVersion\":1,\"label\":\"coverage\",\"message\":\"${COVERAGE}%\",\"color\":\"${COLOR}\"}" > badge.json
          gh gist edit c0f2e0aa0a8c184ee8823dd4feefddd5 -f coverage.json badge.json
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
